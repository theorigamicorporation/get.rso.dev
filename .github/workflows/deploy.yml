name: Deploy | get.rso.dev
run-name: Deploy | ${{ github.run_number }} | by @${{ github.actor }} | ${{ github.event_name}}

#######################################################
# Version: 0.2.0
#######################################################
# NOTE:
# This workflow runs lint checks first, then deploys to FTP.
# On workflow_dispatch it skips lint and deploys immediately.
#######################################################

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '_templates/**'
      - '.github/**'
      - 'tests/**'
      - '.gitignore'
      - 'README.md'
      - 'LICENSE'
      - 'LICENSE.md'
      - 'CODEOWNERS'
      - 'CONTRIBUTING.md'

  # Re-deploy after test pipeline updates catalog with test badges
  workflow_run:
    workflows: ["Test Scripts"]
    types: [completed]
    branches: [main, master]

  workflow_dispatch:

jobs:
  lint:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'ci: update test results')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck scripts
        run: |
          failed=0
          for f in sh/*.sh; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -q 'env sh' || head -1 "$f" | grep -q 'bin/sh'; then
              shellcheck --shell=sh --severity=warning "$f" || failed=1
            else
              shellcheck --shell=bash --severity=warning "$f" || failed=1
            fi
          done
          exit $failed

      - name: Dash syntax check
        run: |
          for f in sh/*.sh; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -q 'env sh' || head -1 "$f" | grep -q 'bin/sh'; then
              dash -n "$f" || exit 1
            fi
          done

  deploy:
    needs: [lint]
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Get Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate catalog from script metadata
        run: sh scripts/generate-catalog.sh

      - name: Inject build info into index.html
        run: |
          SHA=$(git rev-parse --short HEAD)
          TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          REPO_URL="https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD)"
          sed -i "s|<!-- BUILD_SHA -->|<a href=\"${REPO_URL}\">${SHA}</a>|g" index.html
          sed -i "s|<!-- BUILD_TIME -->|${TIME}|g" index.html

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.2.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/
            **/tests/
            **/tests/**
            tests/**
            **/scripts/
            **/scripts/**
            scripts/**
            .gitkeep
            .gitignore
            README.md
            Makefile
            LICENSE
            CODEOWNERS
            CONTRIBUTING.md

      - name: Purge CF Cache
        uses: jakejarvis/cloudflare-purge-action@v0.3.0
        env:
            CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
            CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
