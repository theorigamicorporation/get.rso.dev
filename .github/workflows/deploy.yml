name: Deploy | get.rso.dev
run-name: Deploy | ${{ github.run_number }} | by @${{ github.actor }} | ${{ github.event_name}}

#######################################################
# Version: 0.1.0
#######################################################
# NOTE:
# This workflow uploads/syncs the files to a remote FTP server
# and purges the Cloudflare cache. The FTP server handles
# extension stripping for clean URLs (e.g. get.rso.dev/sh/get-jq).
#######################################################

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '_templates/**'
      - '.github/**'
      - 'tests/**'
      - '.gitignore'
      - 'README.md'
      - 'LICENSE'
      - 'LICENSE.md'
      - 'CODEOWNERS'
      - 'CONTRIBUTING.md'

  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Get Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate catalog from script metadata
        run: sh scripts/generate-catalog.sh

      - name: Inject build info into index.html
        run: |
          SHA=$(git rev-parse --short HEAD)
          TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          REPO_URL="https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD)"
          sed -i "s|<!-- BUILD_SHA -->|<a href=\"${REPO_URL}\">${SHA}</a>|g" index.html
          sed -i "s|<!-- BUILD_TIME -->|${TIME}|g" index.html

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.2.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/
            **/tests/
            **/tests/**
            tests/**
            **/scripts/
            **/scripts/**
            scripts/**
            .gitkeep
            .gitignore
            README.md
            LICENSE
            CODEOWNERS
            CONTRIBUTING.md

      - name: Purge CF Cache
        uses: jakejarvis/cloudflare-purge-action@v0.3.0
        env:
            CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
            CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
