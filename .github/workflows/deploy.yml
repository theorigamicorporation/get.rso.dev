name: Deploy | get.rso.dev
run-name: Deploy | ${{ github.run_number }} | by @${{ github.actor }} | ${{ github.event_name}}

#######################################################
# Version: 0.1.0
#######################################################
# NOTE:
# This workflow builds the docs site and deploys to GitHub Pages.
# Scripts are copied into docs/ with extensions stripped for clean URLs.
#######################################################

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '_templates/**'
      - 'tests/**'
      - '.gitignore'
      - 'LICENSE'
      - 'LICENSE.md'
      - 'CODEOWNERS'
      - 'CONTRIBUTING.md'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Codebase
        uses: actions/checkout@v4

      - name: Build docs site
        run: |
          mkdir -p docs/sh docs/ps
          # Copy script catalog README
          if [ -f docs/README.md ]; then
            echo "docs/README.md already exists, keeping it"
          fi
          # Copy shell scripts without extensions for clean URLs
          for f in sh/*.sh; do
            [ -f "$f" ] || continue
            cp "$f" "docs/sh/$(basename "$f" .sh)"
          done
          # Copy PowerShell scripts without extensions
          for f in ps/*.ps1; do
            [ -f "$f" ] || continue
            cp "$f" "docs/ps/$(basename "$f" .ps1)"
          done
          echo "Build complete. Contents of docs/:"
          find docs/ -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
