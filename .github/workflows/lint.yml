name: Lint & Check
run-name: Lint | ${{ github.run_number }} | by @${{ github.actor }}

#######################################################
# Version: 0.1.0
#######################################################
# NOTE:
# Runs ShellCheck, checkbashisms, and dash syntax validation
# on all shell scripts to ensure POSIX compatibility.
#######################################################

on:
  push:
    paths:
      - 'sh/**'
      - 'ps/**'
      - '_templates/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'sh/**'
      - 'ps/**'
      - '_templates/**'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck POSIX scripts (sh/)
        run: |
          failed=0
          for f in sh/*.sh; do
            [ -f "$f" ] || continue
            # Check shebang — only lint POSIX sh scripts (skip bash scripts)
            if head -1 "$f" | grep -q 'env sh' || head -1 "$f" | grep -q 'bin/sh'; then
              echo "Checking (POSIX): $f"
              shellcheck --shell=sh --severity=warning "$f" || failed=1
            else
              echo "Checking (bash): $f"
              shellcheck --shell=bash --severity=warning "$f" || failed=1
            fi
          done
          exit $failed

      - name: ShellCheck Bash templates (_templates/)
        run: |
          if compgen -G "_templates/*.sh" > /dev/null; then
            shellcheck --shell=bash --severity=warning _templates/*.sh
          else
            echo "No .sh files found in _templates/"
          fi

  posix-check:
    name: POSIX Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install checkbashisms
        run: sudo apt-get install -y devscripts

      - name: Check for bashisms in POSIX sh scripts
        run: |
          failed=0
          for f in sh/*.sh; do
            [ -f "$f" ] || continue
            # Only check scripts with #!/usr/bin/env sh shebang
            if head -1 "$f" | grep -q 'env sh' || head -1 "$f" | grep -q 'bin/sh'; then
              echo "Checking: $f"
              checkbashisms "$f" || failed=1
            else
              echo "Skipping (bash script): $f"
            fi
          done
          exit $failed

  syntax-check:
    name: Dash Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify scripts parse under dash
        run: |
          failed=0
          for f in sh/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking: $f"
            if ! dash -n "$f"; then
              echo "FAIL: $f"
              failed=1
            fi
          done
          exit $failed
