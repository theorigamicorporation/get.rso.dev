name: Test Scripts
run-name: Test | ${{ github.run_number }} | by @${{ github.actor }}

#######################################################
# Version: 0.1.0
#######################################################
# Tests modified scripts across distro containers and
# updates catalog.md with test result badges.
#######################################################

on:
  push:
    branches: [main, master]
    paths:
      - 'sh/**'
      - 'ps/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to test (e.g. get-jq.sh), leave empty for all changed'
        required: false

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.changed.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed scripts
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.script }}" ]; then
            SCRIPTS="${{ github.event.inputs.script }}"
            echo "Testing (manual): $SCRIPTS"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger without script name: test all scripts
            SCRIPTS=$(ls sh/get-*.sh 2>/dev/null | xargs -I{} basename {} | tr '\n' ' ')
            echo "Testing (manual, all): $SCRIPTS"
          else
            SCRIPTS=$(git diff --name-only HEAD~1 HEAD -- 'sh/get-*.sh' | xargs -I{} basename {} 2>/dev/null | tr '\n' ' ')
            if [ -z "$SCRIPTS" ]; then
              # If tests/ changed, test all scripts
              if git diff --name-only HEAD~1 HEAD -- 'tests/' | grep -q .; then
                SCRIPTS=$(ls sh/get-*.sh 2>/dev/null | xargs -I{} basename {} | tr '\n' ' ')
              fi
            fi
            echo "Testing: ${SCRIPTS:-none}"
          fi
          echo "scripts=${SCRIPTS}" >> $GITHUB_OUTPUT

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.scripts != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:22.04
          - ubuntu:24.04
          - ubuntu:25.04
          - debian:12
          - debian:13
          - rockylinux/rockylinux:9
          - rockylinux/rockylinux:10
          - amazonlinux:2023
    steps:
      - uses: actions/checkout@v4

      - name: Test scripts on ${{ matrix.image }}
        id: test
        run: |
          SCRIPTS="${{ needs.detect-changes.outputs.scripts }}"
          IMAGE="docker.io/${{ matrix.image }}"

          # Normalize image name for use as a label
          LABEL=$(echo "${{ matrix.image }}" | tr '/:' '-')

          RESULTS=""
          for script in $SCRIPTS; do
            [ -z "$script" ] && continue
            [ ! -f "sh/$script" ] && continue

            TOOL=$(echo "$script" | sed 's/^get-//; s/\.sh$//')

            # Detect shell
            SHELL_CMD="sh"
            if head -1 "sh/$script" | grep -q 'bash'; then
              SHELL_CMD="bash"
            fi

            # Get metadata
            VERIFY=$(grep -m1 '@verify' "sh/$script" 2>/dev/null | sed 's/.*@verify[[:space:]]*//' || true)
            NOROOT=$(grep -m1 '@noroot' "sh/$script" 2>/dev/null | sed 's/.*@noroot[[:space:]]*//' || true)
            PREREQS_RAW=$(grep -m1 '@prereqs' "sh/$script" 2>/dev/null | sed 's/.*@prereqs[[:space:]]*//; s/ (.*)//' || true)
            SUPPORTED=$(grep -m1 '@supported' "sh/$script" 2>/dev/null | sed 's/.*@supported[[:space:]]*//' || true)

            # Skip script if @supported doesn't match this distro
            if [ -n "$SUPPORTED" ]; then
              # "All" means run everywhere
              if ! echo "$SUPPORTED" | grep -qi "all"; then
                IMAGE_LOWER=$(echo "${{ matrix.image }}" | tr '[:upper:]' '[:lower:]')
                MATCH=false
                case "$IMAGE_LOWER" in
                  *ubuntu*)  echo "$SUPPORTED" | grep -qi "ubuntu" && MATCH=true ;;
                  *debian*)  echo "$SUPPORTED" | grep -qi "debian" && MATCH=true ;;
                  *rocky*)   echo "$SUPPORTED" | grep -qi "rocky\|rhel" && MATCH=true ;;
                  *amazon*)  echo "$SUPPORTED" | grep -qi "amazon" && MATCH=true ;;
                esac
                if [ "$MATCH" = "false" ]; then
                  echo "$script: skip (unsupported distro)"
                  RESULTS="${RESULTS}${script}=skip "
                  continue
                fi
              fi
            fi

            # Build prereqs install command
            PREREQS_CMD=""
            if [ -n "$PREREQS_RAW" ]; then
              APT_PKGS="ca-certificates"
              DNF_PKGS="ca-certificates"
              IFS=',' read -ra ITEMS <<< "$PREREQS_RAW"
              for item in "${ITEMS[@]}"; do
                item=$(echo "$item" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//; s/ (.*)//g')
                [ -z "$item" ] && continue
                case "$item" in
                  *"|"*) first=$(echo "$item" | cut -d'|' -f1); APT_PKGS="$APT_PKGS $first"; DNF_PKGS="$DNF_PKGS $first" ;;
                  "gpg") APT_PKGS="$APT_PKGS gpg"; DNF_PKGS="$DNF_PKGS gnupg2" ;;
                  "software-properties-common") APT_PKGS="$APT_PKGS software-properties-common" ;;
                  *) APT_PKGS="$APT_PKGS $item"; DNF_PKGS="$DNF_PKGS $item" ;;
                esac
              done
              PREREQS_CMD="if command -v apt-get >/dev/null 2>&1; then apt-get update -qq && apt-get install -y -qq $APT_PKGS >/dev/null 2>&1; elif command -v dnf >/dev/null 2>&1; then dnf install -y -q $DNF_PKGS >/dev/null 2>&1; elif command -v yum >/dev/null 2>&1; then yum install -y -q $DNF_PKGS >/dev/null 2>&1; fi; "
            fi

            echo "::group::Testing $script on ${{ matrix.image }}"

            # Build the user command
            USER_CMD="$SHELL_CMD /scripts/$script"
            [ -n "$VERIFY" ] && USER_CMD="$USER_CMD && $VERIFY"

            RESULT="fail"
            if [ "$NOROOT" = "true" ]; then
              # Encode the user command to avoid quoting issues
              ENCODED_USER=$(printf '%s' "$USER_CMD" | base64 -w0)
              ENCODED_ROOT=$(printf '%s' "$PREREQS_CMD" | base64 -w0)

              if docker run --rm -v "$PWD/sh:/hostscripts:ro" "$IMAGE" \
                sh -c "
                  cp -r /hostscripts /scripts 2>/dev/null || true
                  chmod -R 755 /scripts 2>/dev/null || true
                  # Install su/useradd if missing
                  if ! command -v su >/dev/null 2>&1 || ! command -v useradd >/dev/null 2>&1; then
                    if command -v apt-get >/dev/null 2>&1; then
                      apt-get update -qq && apt-get install -y -qq login >/dev/null 2>&1
                    elif command -v dnf >/dev/null 2>&1; then
                      dnf install -y -q util-linux shadow-utils >/dev/null 2>&1
                    elif command -v yum >/dev/null 2>&1; then
                      yum install -y -q util-linux shadow-utils >/dev/null 2>&1
                    fi
                  fi
                  # Run prereqs as root
                  printf '%s' '$ENCODED_ROOT' | base64 -d > /tmp/rootcmd.sh
                  chmod 755 /tmp/rootcmd.sh; sh /tmp/rootcmd.sh
                  # Create testuser
                  if command -v useradd >/dev/null 2>&1; then
                    useradd -m testuser 2>/dev/null || true
                  elif command -v adduser >/dev/null 2>&1; then
                    adduser -D testuser 2>/dev/null || true
                  fi
                  # Write and run user command as testuser
                  printf '#!/bin/sh\nexport PATH=\"\$HOME/.cargo/bin:\$HOME/.local/bin:\$PATH\"\n' > /tmp/testcmd.sh
                  printf '%s' '$ENCODED_USER' | base64 -d >> /tmp/testcmd.sh
                  chmod 755 /tmp/testcmd.sh
                  su testuser -s /bin/sh -c 'sh /tmp/testcmd.sh'
                " 2>&1; then
                RESULT="pass"
              fi
            else
              # Normal (root) execution with prereqs
              if docker run --rm -v "$PWD/sh:/scripts:ro" "$IMAGE" \
                $SHELL_CMD -c "${PREREQS_CMD}${USER_CMD}" 2>&1; then
                RESULT="pass"
              fi
            fi

            echo "::endgroup::"
            echo "$script: $RESULT"
            RESULTS="${RESULTS}${script}=${RESULT} "
          done

          echo "label=${LABEL}" >> $GITHUB_OUTPUT
          echo "results=${RESULTS}" >> $GITHUB_OUTPUT

      - name: Save results file
        run: |
          mkdir -p /tmp/test-results
          echo "${{ steps.test.outputs.results }}" > /tmp/test-results/${{ steps.test.outputs.label }}.txt

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ steps.test.outputs.label }}
          path: /tmp/test-results/

  update-catalog:
    needs: [detect-changes, test]
    if: always() && needs.detect-changes.outputs.scripts != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-results
          pattern: results-*
          merge-multiple: true

      - name: Regenerate catalog with test results
        run: |
          # First regenerate the catalog
          sh scripts/generate-catalog.sh

          # Parse test results and update catalog.md
          SCRIPTS="${{ needs.detect-changes.outputs.scripts }}"

          for script in $SCRIPTS; do
            [ -z "$script" ] && continue
            NAME=$(echo "$script" | sed 's/\.sh$//')

            # Get file hash
            HASH=$(sha256sum "sh/$script" 2>/dev/null | cut -c1-12)

            # Collect results from all distro artifacts
            BADGE_LINE="<!-- tests:${NAME} hash:${HASH}"
            for result_file in /tmp/all-results/*.txt; do
              [ -f "$result_file" ] || continue
              DISTRO=$(basename "$result_file" .txt)

              # Parse the results for this script
              RESULT=$(grep "${script}=" "$result_file" 2>/dev/null | grep -o "${script}=[a-z]*" | cut -d= -f2 || echo "skip")
              [ -z "$RESULT" ] && RESULT="skip"

              BADGE_LINE="${BADGE_LINE} ${DISTRO}:${RESULT}"
            done
            BADGE_LINE="${BADGE_LINE} -->"

            # Replace the test comment line in catalog.md
            if grep -q "<!-- tests:${NAME} " catalog.md; then
              sed -i "s|<!-- tests:${NAME} .*-->|${BADGE_LINE}|g" catalog.md
            fi

            echo "Updated: $NAME -> $BADGE_LINE"
          done

          cat catalog.md

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add catalog.md
          if git diff --cached --quiet; then
            echo "No changes to catalog.md"
          else
            # This push triggers deploy.yml (catalog.md is not in test.yml paths,
            # so test.yml won't re-trigger; lint.yml also won't trigger since
            # catalog.md is not in sh/**)
            git commit -m "ci: update test results in catalog.md"
            # Use -X theirs to auto-resolve catalog.md conflicts (our test results are always newer)
            git pull --rebase -X theirs origin main 2>/dev/null || git pull --rebase -X theirs origin master 2>/dev/null || true
            git push || { git pull --rebase -X theirs && git push; }
          fi
