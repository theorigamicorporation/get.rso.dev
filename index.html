<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get.rso.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --code-bg: #1c2128;
            --success: #3fb950;
            --warning: #d29922;
            --purple: #a371f7;
        }

        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--purple));
            z-index: 1000;
            transition: width 0.1s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
        }

        .container { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            position: fixed;
            left: 0; top: 0;
            height: 100vh;
            overflow-y: auto;
            padding: 2rem 0;
            transition: transform 0.3s ease;
            z-index: 50;
        }

        .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .sidebar-badges {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-tertiary);
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .stats-badge span { color: var(--accent); font-weight: 600; }

        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-tertiary);
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .github-btn:hover {
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
        }

        .kbd {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.15rem 0.4rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 0.25rem;
            padding: 0 1.5rem;
            margin-bottom: 1rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.5rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tab-btn:hover { color: var(--text); border-color: var(--text-muted); }

        .tab-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* Search */
        .search-container { padding: 0 1.5rem; margin-bottom: 1rem; }

        .search-wrapper { position: relative; }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.15s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-results { padding: 0 1rem; max-height: calc(100vh - 280px); overflow-y: auto; }

        .search-result {
            display: block;
            padding: 0.6rem 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 4px;
            margin-bottom: 0.25rem;
            transition: all 0.15s ease;
        }

        .search-result:hover { color: var(--accent); background: var(--bg-tertiary); }

        .search-result-section {
            font-size: 0.7rem;
            color: var(--accent);
            opacity: 0.7;
            display: block;
            margin-top: 0.2rem;
        }

        .search-no-results { padding: 1rem; color: var(--text-muted); font-size: 0.85rem; }

        .hidden { display: none !important; }

        /* TOC */
        .toc { padding: 0 1rem; }

        .toc-section { margin-bottom: 0.5rem; }

        .toc-section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .toc-section-title:hover { background: var(--bg-tertiary); }

        .toc-section-title::before {
            content: '\25B8';
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s ease;
        }

        .toc-section.open .toc-section-title::before { transform: rotate(90deg); }

        .toc-items { display: none; padding-left: 1.5rem; }
        .toc-section.open .toc-items { display: block; }

        .toc-item {
            display: block;
            padding: 0.4rem 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .toc-item:hover { color: var(--accent); background: var(--bg-tertiary); }
        .toc-item.active { color: var(--accent); background: rgba(88, 166, 255, 0.1); }

        /* Main content */
        .main {
            flex: 1;
            margin-left: 320px;
            padding: 3rem 4rem;
            max-width: 1400px;
        }

        h1, h2, h3, h4 {
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        h1 { font-size: 2.5rem; margin-top: 0; }
        h2 { font-size: 1.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        h3 { font-size: 1.25rem; color: var(--accent); }
        h4 { font-size: 1rem; color: var(--text-muted); }

        p { margin-bottom: 1rem; color: var(--text-muted); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* Code blocks */
        pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem 1.2rem;
            padding-top: 2.8rem;
            overflow-x: auto;
            margin: 1rem 0 1.5rem;
            position: relative;
        }

        .code-lang {
            position: absolute;
            top: 0.7rem;
            left: 0.75rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--purple);
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1;
        }

        pre code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            background: none;
            padding: 0;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-tertiary);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* Copy button */
        .copy-btn {
            position: absolute;
            top: 0.7rem;
            right: 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.15s ease;
            opacity: 1;
            line-height: 1;
        }

        .copy-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .copy-btn.copied { background: var(--success); border-color: var(--success); color: var(--bg); }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0 1.5rem;
        }

        th, td {
            padding: 0.5rem 0.75rem;
            text-align: left;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        th {
            background: var(--bg-secondary);
            font-weight: 600;
            color: var(--text);
        }

        td { color: var(--text-muted); }

        /* Lists */
        ul, ol { margin: 1rem 0; padding-left: 1.5rem; color: var(--text-muted); }
        li { margin: 0.5rem 0; }
        hr { border: none; height: 1px; background: var(--border); margin: 3rem 0; }

        /* Heading links */
        h2, h3 { cursor: pointer; position: relative; }

        .link-copied-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: var(--bg);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .link-copied-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: 5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-to-top:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .back-to-top.visible { opacity: 1; visibility: visible; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main h2, .main h3, .main pre, .main p { animation: fadeInUp 0.4s ease forwards; }

        /* Mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-backdrop.show { opacity: 1; }

        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        .mobile-toggle:hover { background: var(--bg-tertiary); border-color: var(--accent); transform: scale(1.05); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 2rem 1.5rem; max-width: 100%; }
            .mobile-toggle { display: flex; align-items: center; justify-content: center; }
            .sidebar-backdrop { display: block; }
        }

        @media (max-width: 768px) {
            .main { padding: 1.5rem 1rem; }
            pre { padding-left: 0.75rem; padding-right: 0.75rem; margin-left: -0.5rem; margin-right: -0.5rem; }
            h2 { font-size: 1.5rem; }
            h3 { font-size: 1.15rem; }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>
    <div class="loading" id="loading">Loading scripts</div>

    <div class="container" id="app" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>get.rso.dev</h1>
                <p>Cross-distro install scripts for your terminal</p>
                <div class="sidebar-badges">
                    <div class="stats-badge">
                        <span id="scriptCount">0</span> scripts
                    </div>
                    <a href="https://github.com/theorigamicorporation/get.rso.dev" target="_blank" class="github-btn">
                        Star
                    </a>
                </div>
            </div>
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="bash">Bash</button>
                <button class="tab-btn" data-tab="powershell">PowerShell</button>
            </div>
            <div class="search-container">
                <div class="search-wrapper">
                    <span class="search-icon">?</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off">
                    <span class="kbd">Ctrl+K</span>
                </div>
            </div>
            <div class="search-results hidden" id="searchResults"></div>
            <nav class="toc" id="toc"></nav>
        </aside>

        <main class="main" id="content"></main>
    </div>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <button class="back-to-top" id="backToTop">&uarr;</button>
    <button class="mobile-toggle" id="mobileToggle">&#9776;</button>
    <div class="link-copied-toast" id="toast">Link copied to clipboard!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/powershell.min.js"></script>

    <script>
        function slugify(text) {
            return text.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .trim();
        }

        let sidebar, backdrop, mobileToggle;
        let activeTab = 'bash';
        let allSections = {}; // { bash: [...], powershell: [...] }
        let fullMarkdown = '';

        function toggleSidebar() {
            if (sidebar) {
                sidebar.classList.toggle('open');
                backdrop.classList.toggle('show');
            }
        }

        function closeSidebar() {
            if (sidebar) {
                sidebar.classList.remove('open');
                backdrop.classList.remove('show');
            }
        }

        // Custom renderer
        const renderer = new marked.Renderer();
        renderer.heading = function(text, level) {
            const slug = slugify(text);
            return '<h' + level + ' id="' + slug + '">' + text + '</h' + level + '>';
        };

        marked.setOptions({
            renderer: renderer,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: false,
            gfm: true
        });

        // Parse markdown into tab sections based on H1 headings
        function parseTabs(markdown) {
            const sections = {};
            const parts = markdown.split(/^# /m);

            parts.forEach(part => {
                if (!part.trim()) return;
                const lines = part.split('\n');
                const title = lines[0].trim().toLowerCase();
                const content = lines.slice(1).join('\n');

                if (title === 'bash') {
                    sections.bash = content;
                } else if (title === 'powershell') {
                    sections.powershell = content;
                }
            });

            return sections;
        }

        function renderTab(tabName) {
            activeTab = tabName;
            const content = allSections[tabName] || '';
            const html = marked.parse(content);
            document.getElementById('content').innerHTML = html;

            // Highlight
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });

            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            buildTOC();
            addCopyButtons();
            addHeadingLinks();
            buildSearchIndex();
            updateStats();
        }

        async function init() {
            try {
                const response = await fetch('./catalog.md');
                fullMarkdown = await response.text();

                allSections = parseTabs(fullMarkdown);
                renderTab('bash');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'flex';

                initMobileMenu();
            } catch (error) {
                document.getElementById('loading').textContent = 'Error loading content: ' + error.message;
            }
        }

        function buildTOC() {
            const content = document.getElementById('content');
            const toc = document.getElementById('toc');
            toc.innerHTML = '';
            const h2s = content.querySelectorAll('h2');

            h2s.forEach((h2, index) => {
                const section = document.createElement('div');
                section.className = 'toc-section';
                if (index === 0) section.classList.add('open');

                const title = document.createElement('div');
                title.className = 'toc-section-title';
                title.textContent = h2.textContent;
                title.onclick = () => section.classList.toggle('open');
                section.appendChild(title);

                const items = document.createElement('div');
                items.className = 'toc-items';

                let sibling = h2.nextElementSibling;
                while (sibling && sibling.tagName !== 'H2') {
                    if (sibling.tagName === 'H3') {
                        const link = document.createElement('a');
                        link.className = 'toc-item';
                        link.href = '#' + sibling.id;
                        link.textContent = sibling.textContent;
                        link.onclick = () => {
                            if (window.innerWidth <= 1024) closeSidebar();
                        };
                        items.appendChild(link);
                    }
                    sibling = sibling.nextElementSibling;
                }

                section.appendChild(items);
                toc.appendChild(section);
            });
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach(pre => {
                const code = pre.querySelector('code');
                if (code) {
                    const classes = code.className.split(' ');
                    const langClass = classes.find(c => c.startsWith('language-'));
                    if (langClass) {
                        const lang = langClass.replace('language-', '');
                        const badge = document.createElement('span');
                        badge.className = 'code-lang';
                        badge.textContent = lang;
                        pre.appendChild(badge);
                    }
                }

                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = async () => {
                    const text = pre.querySelector('code').textContent;
                    await navigator.clipboard.writeText(text);
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = 'Copy';
                        btn.classList.remove('copied');
                    }, 2000);
                };
                pre.appendChild(btn);
            });
        }

        function addHeadingLinks() {
            document.querySelectorAll('#content h2, #content h3').forEach(heading => {
                heading.onclick = async () => {
                    const url = window.location.origin + window.location.pathname + '#' + heading.id;
                    await navigator.clipboard.writeText(url);
                    showToast();
                };
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateStats() {
            const count = document.querySelectorAll('#content h3').length;
            document.getElementById('scriptCount').textContent = count;
        }

        // Scroll progress
        function updateScrollProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            document.getElementById('scrollProgress').style.width = progress + '%';

            const backToTop = document.getElementById('backToTop');
            if (scrollTop > 500) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        }

        document.getElementById('backToTop').onclick = () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.addEventListener('scroll', updateScrollProgress);

        function initMobileMenu() {
            sidebar = document.getElementById('sidebar');
            backdrop = document.getElementById('sidebarBackdrop');
            mobileToggle = document.getElementById('mobileToggle');

            if (mobileToggle) mobileToggle.onclick = toggleSidebar;
            if (backdrop) backdrop.onclick = closeSidebar;
        }

        // Active section tracking
        window.addEventListener('scroll', () => {
            const items = document.querySelectorAll('.toc-item');
            let current = '';
            document.querySelectorAll('h3').forEach(h3 => {
                if (h3.getBoundingClientRect().top < 150) current = h3.id;
            });
            items.forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('href') === '#' + current) item.classList.add('active');
            });
        });

        // Search
        let searchIndex = [];

        function buildSearchIndex() {
            searchIndex = [];
            const content = document.getElementById('content');
            const headings = content.querySelectorAll('h2, h3');

            headings.forEach(heading => {
                let parentSection = '';
                if (heading.tagName === 'H3') {
                    let prev = heading.previousElementSibling;
                    while (prev) {
                        if (prev.tagName === 'H2') { parentSection = prev.textContent; break; }
                        prev = prev.previousElementSibling;
                    }
                }

                let codeContent = '';
                let sibling = heading.nextElementSibling;
                while (sibling && !['H2', 'H3'].includes(sibling.tagName)) {
                    if (sibling.tagName === 'PRE' || sibling.tagName === 'P') {
                        codeContent += ' ' + sibling.textContent;
                    }
                    sibling = sibling.nextElementSibling;
                }

                searchIndex.push({
                    title: heading.textContent,
                    id: heading.id,
                    section: parentSection,
                    tab: activeTab,
                    type: heading.tagName,
                    content: codeContent.toLowerCase()
                });
            });

            // Also index the other tab
            const otherTab = activeTab === 'bash' ? 'powershell' : 'bash';
            const otherContent = allSections[otherTab];
            if (otherContent) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = marked.parse(otherContent);
                const otherHeadings = tempDiv.querySelectorAll('h2, h3');
                otherHeadings.forEach(heading => {
                    searchIndex.push({
                        title: heading.textContent,
                        id: heading.id,
                        section: '',
                        tab: otherTab,
                        type: heading.tagName,
                        content: ''
                    });
                });
            }
        }

        function performSearch(query) {
            const searchResults = document.getElementById('searchResults');
            const toc = document.getElementById('toc');
            const q = query.toLowerCase().trim();

            if (!q) {
                searchResults.classList.add('hidden');
                toc.classList.remove('hidden');
                return;
            }

            searchResults.classList.remove('hidden');
            toc.classList.add('hidden');

            const results = searchIndex.filter(item =>
                item.title.toLowerCase().includes(q) || item.content.includes(q)
            );

            if (results.length === 0) {
                searchResults.innerHTML = '<div class="search-no-results">No results found</div>';
                return;
            }

            searchResults.innerHTML = results.slice(0, 20).map(item => {
                const tabLabel = item.tab !== activeTab ? ' [' + item.tab + ']' : '';
                return '<a href="#' + item.id + '" class="search-result" data-tab="' + item.tab + '" onclick="searchNavigate(\'' + item.tab + '\', \'' + item.id + '\')">' +
                    item.title + tabLabel +
                    (item.section ? '<span class="search-result-section">' + item.section + '</span>' : '') +
                '</a>';
            }).join('');
        }

        function searchNavigate(tab, id) {
            if (tab !== activeTab) {
                renderTab(tab);
            }
            clearSearch();
            setTimeout(() => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('toc').classList.remove('hidden');
            if (window.innerWidth <= 1024) closeSidebar();
        }

        // Event listeners
        let searchTimeout;
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => performSearch(e.target.value), 150);
            });

            document.getElementById('searchInput').addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { clearSearch(); e.target.blur(); }
            });

            document.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => renderTab(btn.dataset.tab);
            });
        });

        init();
    </script>
</body>
</html>
