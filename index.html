                <summary class="filter-summary">Filters</summary>
                <div class="filter-bar" id="filterBar"></div>
            </details>
            <nav class="toc" id="toc"></nav>
        </aside>

        <main class="main" id="content"></main>
    </div>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <button class="back-to-top" id="backToTop">&uarr;</button>
    <button class="mobile-toggle" id="mobileToggle">&#9776;</button>
    <div class="link-copied-toast" id="toast">Link copied to clipboard!</div>
    <button class="builder-toggle" id="builderToggle" title="Script Builder">
        +
        <span class="builder-count" id="builderCount"></span>
    </button>
    <div class="builder-backdrop" id="builderBackdrop"></div>
    <div class="builder-drawer" id="builderDrawer">
        <div class="builder-header">
            <h3>Script Builder</h3>
            <button class="builder-close" id="builderClose">&times;</button>
        </div>
        <div class="builder-list" id="builderList">
            <div class="builder-empty">Click <code>+ Add</code> on any script<br>to build a combined installer</div>
        </div>
        <div class="builder-preview" id="builderPreview"></div>
        <div class="builder-footer" id="builderFooter" style="display:none">
            <div class="builder-actions">
                <button class="builder-btn builder-btn-primary" id="builderCopy">Copy Script</button>
                <button class="builder-btn builder-btn-secondary" id="builderDownload">Download .sh</button>
            </div>
            <button class="builder-btn builder-btn-secondary" id="builderPreviewToggle">Preview</button>
            <button class="builder-btn builder-btn-danger" id="builderClear">Clear all</button>
        </div>
    </div>
    <div class="build-footer">build <!-- BUILD_SHA --> &middot; <!-- BUILD_TIME --></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/powershell.min.js"></script>

    <script>
        function slugify(text) {
            return text.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .trim();
        }

        let sidebar, backdrop, mobileToggle;
        let activeTab = 'linux';
        let allSections = {}; // { bash: [...], powershell: [...] }
        let fullMarkdown = '';

        function toggleSidebar() {
            if (sidebar) {
                sidebar.classList.toggle('open');
                backdrop.classList.toggle('show');
            }
        }

        function closeSidebar() {
            if (sidebar) {
                sidebar.classList.remove('open');
                backdrop.classList.remove('show');
            }
        }

        // Configure marked — use default renderer, post-process DOM for headings and alt lines
        marked.setOptions({
            breaks: false,
            gfm: true
        });

        // Parse markdown into tab sections based on H1 headings
        function parseTabs(markdown) {
            const sections = {};

            // Match only top-level H1 headings (# Linux, # Windows)
            // Avoid splitting on # comments inside code blocks
            const tabRegex = /^# (Linux|Windows)\s*$/gmi;
            let match;
            const boundaries = [];

            while ((match = tabRegex.exec(markdown)) !== null) {
                boundaries.push({ name: match[1].toLowerCase(), start: match.index + match[0].length });
            }

            for (let i = 0; i < boundaries.length; i++) {
                const start = boundaries[i].start;
                const end = i + 1 < boundaries.length ? boundaries[i + 1].start - boundaries[i + 1].name.length - 2 : markdown.length;
                sections[boundaries[i].name] = markdown.substring(start, end).trim();
            }

            return sections;
        }

        function renderTab(tabName) {
            activeTab = tabName;
            const content = allSections[tabName] || '';
            const html = marked.parse(content);
            document.getElementById('content').innerHTML = html;

            // Add IDs to headings
            document.querySelectorAll('#content h1, #content h2, #content h3, #content h4').forEach(h => {
                h.id = slugify(h.textContent);
            });

            // Syntax highlight code blocks
            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });

            // Transform metadata paragraphs into styled pill badges
            styleMetadata();

            // Build filter bar from metadata
            buildFilters();

            // Process # alt: lines in code blocks for wget/curl toggle
            processAltLines();

            // Add method pickers to installer script blocks
            addMethodPickers();

            // Render test result badges (before collapsibles so it appears above Options)
            renderTestBadges(allSections[tabName] || '');

            // Wrap Options and Examples in collapsible details
            wrapCollapsibles();

            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            buildTOC();
            addCopyButtons();
            addBuilderButtons();
            addHeadingLinks();
            buildSearchIndex();
            updateStats();
            renderBuilder();
        }

        // Post-process code blocks: extract # alt: lines and store wget/curl variants
        // Active filters
        let activeFilters = { tags: new Set(), methods: new Set(), distros: new Set() };

        // Build filter bar from metadata pills in the content
        function buildFilters() {
            const filterBar = document.getElementById('filterBar');
            filterBar.innerHTML = '';

            const allTags = new Set();
            const allMethods = new Set();
            const allDistros = new Set();

            // Collect all unique values from metadata pills
            document.querySelectorAll('#content .meta-pill.tag').forEach(p => allTags.add(p.textContent));
            document.querySelectorAll('#content .meta-pill.method').forEach(p => allMethods.add(p.textContent));
            document.querySelectorAll('#content .meta-pill.distro').forEach(p => allDistros.add(p.textContent));

            function createGroup(label, values, filterType, cssClass) {
                if (values.size === 0) return;
                const group = document.createElement('div');
                group.className = 'filter-group';

                const lbl = document.createElement('span');
                lbl.className = 'filter-group-label';
                lbl.textContent = label;
                group.appendChild(lbl);

                const pills = document.createElement('div');
                pills.className = 'filter-pills';

                Array.from(values).sort().forEach(value => {
                    const pill = document.createElement('button');
                    pill.className = 'filter-pill ' + cssClass;
                    if (activeFilters[filterType].has(value)) pill.classList.add('active');
                    pill.textContent = value;
                    pill.onclick = () => {
                        if (activeFilters[filterType].has(value)) {
                            activeFilters[filterType].delete(value);
                            pill.classList.remove('active');
                        } else {
                            activeFilters[filterType].add(value);
                            pill.classList.add('active');
                        }
                        applyFilters();
                    };
                    pills.appendChild(pill);
                });

                group.appendChild(pills);
                filterBar.appendChild(group);
            }

            createGroup('distros', allDistros, 'distros', 'distro-filter');
            createGroup('methods', allMethods, 'methods', 'method-filter');
            createGroup('tags', allTags, 'tags', 'tag-filter');

            // Clear all button
            const hasAny = allTags.size + allMethods.size + allDistros.size > 0;
            if (hasAny) {
                const clearBtn = document.createElement('button');
                clearBtn.className = 'filter-clear';
                clearBtn.textContent = 'clear filters';
                clearBtn.onclick = () => {
                    activeFilters = { tags: new Set(), methods: new Set(), distros: new Set() };
                    filterBar.querySelectorAll('.filter-pill.active').forEach(p => p.classList.remove('active'));
                    applyFilters();
                };
                filterBar.appendChild(clearBtn);
            }
        }

        function applyFilters() {
            const totalActive = activeFilters.tags.size + activeFilters.methods.size + activeFilters.distros.size;
            const hasFilters = totalActive > 0;

            // Update summary text
            const summary = document.querySelector('.filter-summary');
            if (summary) {
                summary.textContent = totalActive > 0 ? 'Filters (' + totalActive + ' active)' : 'Filters';
            }

            document.querySelectorAll('#content h3').forEach(h3 => {
                if (!hasFilters) {
                    showScript(h3, true);
                    return;
                }

                // Find the script-meta block for this h3
                let meta = null;
                let el = h3.nextElementSibling;
                while (el && !['H2', 'H3'].includes(el.tagName)) {
                    if (el.classList && el.classList.contains('script-meta')) { meta = el; break; }
                    el = el.nextElementSibling;
                }

                if (!meta) { showScript(h3, false); return; }

                // Get this script's values
                const scriptTags = new Set();
                const scriptMethods = new Set();
                const scriptDistros = new Set();
                meta.querySelectorAll('.meta-pill.tag').forEach(p => scriptTags.add(p.textContent));
                meta.querySelectorAll('.meta-pill.method').forEach(p => scriptMethods.add(p.textContent));
                meta.querySelectorAll('.meta-pill.distro').forEach(p => scriptDistros.add(p.textContent));

                // Script matches if it has ALL active filters (AND logic)
                let match = true;
                activeFilters.tags.forEach(t => { if (!scriptTags.has(t)) match = false; });
                activeFilters.methods.forEach(m => { if (!scriptMethods.has(m)) match = false; });
                activeFilters.distros.forEach(d => { if (!scriptDistros.has(d)) match = false; });

                showScript(h3, match);
            });

            // Hide empty section headings (h2 with no visible h3s after them)
            document.querySelectorAll('#content h2').forEach(h2 => {
                let hasVisible = false;
                let el = h2.nextElementSibling;
                while (el && el.tagName !== 'H2') {
                    if (el.tagName === 'H3' && !el.classList.contains('script-filtered-out')) {
                        hasVisible = true;
                        break;
                    }
                    el = el.nextElementSibling;
                }
                h2.classList.toggle('script-filtered-out', !hasVisible);
            });
        }

        function showScript(h3, visible) {
            h3.classList.toggle('script-filtered-out', !visible);
            // Toggle all siblings until next h2/h3
            let el = h3.nextElementSibling;
            while (el && !['H2', 'H3'].includes(el.tagName)) {
                el.classList.toggle('script-filtered-out', !visible);
                el = el.nextElementSibling;
            }
        }

        // Transform metadata paragraphs (Supported/Methods/Tags/Hash) into styled pill badges
        function styleMetadata() {
            document.querySelectorAll('#content p').forEach(p => {
                const text = p.textContent;
                if (!text.includes('Supported:') && !text.includes('Methods:') &&
                    !text.includes('Tags:') && !text.includes('Hash:')) return;

                const meta = document.createElement('div');
                meta.className = 'script-meta';

                // Parse each metadata field from the <strong> elements
                const fields = [
                    { key: 'Supported:', label: 'distros', pillClass: 'distro' },
                    { key: 'Methods:', label: 'methods', pillClass: 'method' },
                    { key: 'Prereqs:', label: 'prereqs', pillClass: 'prereq' },
                    { key: 'Requires:', label: 'requires', pillClass: 'prereq' },
                    { key: 'Tags:', label: 'tags', pillClass: 'tag' },
                    { key: 'Hash:', label: 'hash', pillClass: 'hash' }
                ];

                // Extract text between each <strong>Key:</strong> and the next <strong> or end
                const html = p.innerHTML;

                fields.forEach(field => {
                    const regex = new RegExp('<strong>' + field.key.replace(':', ':') + '</strong>\\s*([^<]*?)(?=<strong>|<code>|$)');
                    const codeRegex = new RegExp('<strong>' + field.key.replace(':', ':') + '</strong>\\s*<code>([^<]*?)</code>');

                    let values = [];
                    const codeMatch = html.match(codeRegex);
                    const textMatch = html.match(regex);

                    if (codeMatch) {
                        values = [codeMatch[1].trim()];
                    } else if (textMatch && textMatch[1].trim()) {
                        values = textMatch[1].split(',').map(v => v.trim()).filter(Boolean);
                    }

                    if (values.length === 0) return;

                    const row = document.createElement('div');
                    row.className = 'script-meta-row';

                    const label = document.createElement('span');
                    label.className = 'script-meta-label';
                    label.textContent = field.label;
                    row.appendChild(label);

                    const pills = document.createElement('span');
                    pills.className = 'script-meta-pills';

                    values.forEach(v => {
                        const pill = document.createElement('span');
                        pill.className = 'meta-pill ' + field.pillClass;
                        pill.textContent = v;
                        pills.appendChild(pill);
                    });

                    row.appendChild(pills);
                    meta.appendChild(row);
                });

                p.parentNode.replaceChild(meta, p);
            });
        }

        function processAltLines() {
            document.querySelectorAll('#content pre code').forEach(code => {
                const rawText = code.textContent;
                if (!rawText.includes('# alt:')) return;

                const pre = code.parentElement;
                const lines = rawText.split('\n');
                const primaryResult = [];
                const altResult = [];

                for (const line of lines) {
                    if (line.trim().startsWith('# alt:')) {
                        // Replace the previous line in altResult with the alt version
                        altResult.pop();
                        altResult.push(line.replace(/^(\s*)# alt:\s*/, '$1'));
                    } else {
                        primaryResult.push(line);
                        altResult.push(line);
                    }
                }

                // Trim trailing empty lines
                while (primaryResult.length && !primaryResult[primaryResult.length - 1].trim()) primaryResult.pop();
                while (altResult.length && !altResult[altResult.length - 1].trim()) altResult.pop();

                const primaryText = primaryResult.join('\n');
                const altText = altResult.join('\n');

                pre.dataset.primary = primaryText;
                pre.dataset.alt = altText;
                pre.dataset.hasAlt = 'true';

                // Detect toggle labels from content
                const lang = (code.className.match(/language-(\w+)/) || [])[1] || '';
                if (lang === 'powershell') {
                    pre.dataset.primaryLabel = 'WebClient';
                    pre.dataset.altLabel = 'Invoke-WebRequest';
                } else {
                    pre.dataset.primaryLabel = primaryText.includes('wget') ? 'wget' : 'option 1';
                    pre.dataset.altLabel = altText.includes('curl') ? 'curl' : 'option 2';
                }

                // Show active variant
                const displayText = dlPref === 'alt' ? altText : primaryText;
                code.textContent = displayText;

                // Re-highlight
                if (lang && hljs.getLanguage(lang)) hljs.highlightElement(code);
            });
        }

        // Add method picker dropdowns to installer script code blocks
        // Parse <!-- tests:scriptname hash:xxx distro:result ... --> comments and render badges
        function renderTestBadges(rawMarkdown) {
            const testRegex = /<!-- tests:(\S+) hash:(\S+)(.*?)-->/g;
            let match;
            const testData = {};

            while ((match = testRegex.exec(rawMarkdown)) !== null) {
                const name = match[1];
                const hash = match[2];
                const resultsStr = match[3].trim();
                const results = {};

                if (resultsStr) {
                    resultsStr.split(/\s+/).forEach(entry => {
                        const [distro, status] = entry.split(':');
                        if (distro && status) results[distro] = status;
                    });
                }

                testData[name] = { hash, results };
            }

            // Attach badges to each h3 script heading
            document.querySelectorAll('#content h3').forEach(h3 => {
                const scriptName = h3.textContent.trim();
                const data = testData[scriptName];
                if (!data) return;

                const hasResults = Object.keys(data.results).length > 0;

                // Create collapsible test status
                const details = document.createElement('details');
                details.className = 'script-details';

                const summary = document.createElement('summary');
                const passCount = Object.values(data.results).filter(v => v === 'pass').length;
                const failCount = Object.values(data.results).filter(v => v === 'fail').length;
                const total = Object.keys(data.results).length;

                if (!hasResults) {
                    summary.textContent = 'Tests (not yet run)';
                } else if (failCount === 0) {
                    summary.textContent = 'Tests (' + passCount + '/' + total + ' passing)';
                } else {
                    summary.textContent = 'Tests (' + passCount + '/' + total + ' passing, ' + failCount + ' failing)';
                }

                details.appendChild(summary);

                const inner = document.createElement('div');
                inner.className = 'details-content';

                if (hasResults) {
                    const badges = document.createElement('div');
                    badges.className = 'test-badges';

                    // Sort distros for consistent display
                    Object.entries(data.results).sort().forEach(([distro, status]) => {
                        const badge = document.createElement('span');
                        badge.className = 'test-badge ' + status;
                        // Clean up distro name for display
                        const displayName = distro.replace(/^(docker\.io-library-|docker\.io-)/, '');
                        badge.innerHTML = '<span class="dot"></span>' + displayName;
                        badges.appendChild(badge);
                    });

                    inner.appendChild(badges);
                } else {
                    const note = document.createElement('p');
                    note.style.cssText = 'color: var(--text-muted); font-size: 0.8rem; margin: 0;';
                    note.textContent = 'No test results yet. Tests run automatically when the script is modified.';
                    inner.appendChild(note);
                }

                details.appendChild(inner);

                // Insert after method-picker if it exists, otherwise after the first <pre>
                let insertAfter = null;

                // Walk siblings of h3 to find the right spot
                let el = h3.nextElementSibling;
                while (el && !['H2', 'H3'].includes(el.tagName)) {
                    if (el.classList && el.classList.contains('method-picker')) {
                        insertAfter = el;
                        break;
                    }
                    if (el.tagName === 'PRE' && !insertAfter) {
                        insertAfter = el; // first pre, keep looking for method-picker
                    }
                    el = el.nextElementSibling;
                }

                if (!insertAfter) insertAfter = h3; // fallback

                insertAfter.parentNode.insertBefore(details, insertAfter.nextSibling);
            });
        }

        function addMethodPickers() {
            const content = document.getElementById('content');

            // Find all "Methods:" lines and associate them with the next code block
            content.querySelectorAll('strong').forEach(strong => {
                if (!strong.textContent.trim().startsWith('Methods:')) return;

                const methodsP = strong.closest('p');
                if (!methodsP) return;

                // Extract method list from the text after "Methods:"
                const fullText = methodsP.textContent;
                const methodsMatch = fullText.match(/Methods:\s*(.+)/);
                if (!methodsMatch) return;

                const methods = methodsMatch[1].split(',').map(m => m.trim()).filter(Boolean);
                if (methods.length === 0) return;

                // Find the first code block AFTER the Methods line (the main install command)
                let codeBlock = null;
                let el = methodsP.nextElementSibling;
                while (el) {
                    if (el.tagName === 'PRE') { codeBlock = el; break; }
                    if (el.tagName === 'H3' || el.tagName === 'H2') break;
                    el = el.nextElementSibling;
                }

                if (!codeBlock) return;

                // Store the base command (without --method)
                const code = codeBlock.querySelector('code');
                if (!code) return;

                codeBlock.dataset.baseWget = codeBlock.dataset.primary || code.textContent;
                codeBlock.dataset.baseCurl = codeBlock.dataset.alt || '';
                codeBlock.dataset.methods = methods.join(',');

                // Create picker
                const picker = document.createElement('div');
                picker.className = 'method-picker';

                const label = document.createElement('span');
                label.className = 'method-picker-label';
                label.textContent = 'Method:';

                const select = document.createElement('select');

                const autoOpt = document.createElement('option');
                autoOpt.value = '';
                autoOpt.textContent = 'auto (default)';
                select.appendChild(autoOpt);

                methods.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    select.appendChild(opt);
                });

                select.onchange = () => {
                    updateMethodCommand(codeBlock, select.value);
                };

                picker.appendChild(label);
                picker.appendChild(select);

                // Insert picker after the code block
                codeBlock.parentNode.insertBefore(picker, codeBlock.nextSibling);
            });
        }

        function updateMethodCommand(pre, method) {
            const code = pre.querySelector('code');
            const lang = (code.className.match(/language-(\w+)/) || [])[1] || '';
            const hasAlt = pre.dataset.hasAlt === 'true';

            let primaryBase = pre.dataset.baseWget || '';
            let altBase = pre.dataset.baseCurl || '';

            let primaryCmd, altCmd;
            if (method) {
                // Append --method arg: "| sh" becomes "| sh -s -- --method=X"
                primaryCmd = primaryBase.replace(/\|\s*sh\s*$/, '| sh -s -- --method=' + method);
                altCmd = altBase.replace(/\|\s*sh\s*$/, '| sh -s -- --method=' + method);
            } else {
                primaryCmd = primaryBase;
                altCmd = altBase;
            }

            // Update stored data for toggle switching
            pre.dataset.primary = primaryCmd;
            if (altCmd) pre.dataset.alt = altCmd;

            // Display the active variant
            const displayText = (dlPref === 'alt' && altCmd) ? altCmd : primaryCmd;
            code.textContent = displayText;
            if (lang && hljs.getLanguage(lang)) hljs.highlightElement(code);
        }

        // Wrap "Options:" tables and example code blocks in collapsible <details>
        function wrapCollapsibles() {
            const content = document.getElementById('content');

            // Find all <strong>Options:</strong> or <p><strong>Options:</strong></p>
            content.querySelectorAll('strong').forEach(strong => {
                if (!strong.textContent.trim().startsWith('Options:')) return;

                const optionsP = strong.closest('p') || strong;

                // Collect: the Options paragraph, the table, and the next code block (examples)
                const optionsElements = [];
                const examplesElements = [];

                let el = optionsP.nextElementSibling;

                // Collect table
                while (el && (el.tagName === 'TABLE' || el.tagName === 'P')) {
                    optionsElements.push(el);
                    if (el.tagName === 'TABLE') { el = el.nextElementSibling; break; }
                    el = el.nextElementSibling;
                }

                // Collect example code blocks (everything until next h2/h3 or another Options)
                while (el && !['H2', 'H3'].includes(el.tagName)) {
                    const hasOptions = el.querySelector && el.querySelector('strong') &&
                        el.querySelector('strong').textContent.trim().startsWith('Options:');
                    if (hasOptions) break;
                    examplesElements.push(el);
                    el = el.nextElementSibling;
                }

                // Wrap Options table in <details>
                if (optionsElements.length > 0) {
                    const details = document.createElement('details');
                    details.className = 'script-details';
                    const summary = document.createElement('summary');
                    summary.textContent = 'Options';
                    details.appendChild(summary);
                    const inner = document.createElement('div');
                    inner.className = 'details-content';
                    optionsElements.forEach(e => inner.appendChild(e));
                    details.appendChild(inner);
                    optionsP.parentNode.insertBefore(details, optionsP.nextSibling);
                }

                // Wrap Examples in <details>
                if (examplesElements.length > 0) {
                    const details = document.createElement('details');
                    details.className = 'script-details';
                    const summary = document.createElement('summary');
                    summary.textContent = 'Examples';
                    details.appendChild(summary);
                    const inner = document.createElement('div');
                    inner.className = 'details-content';
                    examplesElements.forEach(e => inner.appendChild(e));
                    details.appendChild(inner);

                    // Insert after the Options details (or after optionsP if no options details)
                    const insertAfter = optionsP.nextElementSibling || optionsP;
                    insertAfter.parentNode.insertBefore(details, insertAfter.nextSibling);
                }

                // Remove the "Options:" paragraph itself
                optionsP.remove();
            });
        }

        async function init() {
            try {
                const response = await fetch('./catalog.md');
                fullMarkdown = await response.text();

                allSections = parseTabs(fullMarkdown);
                renderTab('linux');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'flex';

                initMobileMenu();
            } catch (error) {
                document.getElementById('loading').textContent = 'Error loading content: ' + error.message;
            }
        }

        function buildTOC() {
            const content = document.getElementById('content');
            const toc = document.getElementById('toc');
            toc.innerHTML = '';
            const h2s = content.querySelectorAll('h2');

            h2s.forEach((h2, index) => {
                const section = document.createElement('div');
                section.className = 'toc-section';
                if (index === 0) section.classList.add('open');

                const title = document.createElement('div');
                title.className = 'toc-section-title';
                title.textContent = h2.textContent;
                title.onclick = () => section.classList.toggle('open');
                section.appendChild(title);

                const items = document.createElement('div');
                items.className = 'toc-items';

                let sibling = h2.nextElementSibling;
                while (sibling && sibling.tagName !== 'H2') {
                    if (sibling.tagName === 'H3') {
                        const link = document.createElement('a');
                        link.className = 'toc-item';
                        link.href = '#' + sibling.id;
                        link.textContent = sibling.textContent;
                        link.onclick = () => {
                            if (window.innerWidth <= 1024) closeSidebar();
                        };
                        items.appendChild(link);
                    }
                    sibling = sibling.nextElementSibling;
                }

                section.appendChild(items);
                toc.appendChild(section);
            });
        }

        // Global preference: 'primary' (first option) or 'alt' (second option)
        let dlPref = localStorage.getItem('get-rso-dl-pref') || 'primary';

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach(pre => {
                const code = pre.querySelector('code');
                if (!code) return;

                // Language badge
                const classes = code.className.split(' ');
                const langClass = classes.find(c => c.startsWith('language-'));
                if (langClass) {
                    const lang = langClass.replace('language-', '');
                    const badge = document.createElement('span');
                    badge.className = 'code-lang';
                    badge.textContent = lang;
                    pre.appendChild(badge);
                }

                // Add toggle if this block has alternatives
                if (pre.dataset.hasAlt === 'true') {
                    const primaryLabel = pre.dataset.primaryLabel || 'wget';
                    const altLabel = pre.dataset.altLabel || 'curl';

                    const toggle = document.createElement('div');
                    toggle.className = 'dl-toggle';

                    const primaryBtn = document.createElement('button');
                    primaryBtn.className = 'dl-toggle-btn' + (dlPref === 'primary' ? ' active' : '');
                    primaryBtn.textContent = primaryLabel;
                    primaryBtn.dataset.pref = 'primary';

                    const altBtn = document.createElement('button');
                    altBtn.className = 'dl-toggle-btn' + (dlPref === 'alt' ? ' active' : '');
                    altBtn.textContent = altLabel;
                    altBtn.dataset.pref = 'alt';

                    primaryBtn.onclick = () => switchDlPref('primary');
                    altBtn.onclick = () => switchDlPref('alt');

                    toggle.appendChild(primaryBtn);
                    toggle.appendChild(altBtn);
                    pre.appendChild(toggle);
                }

                // Copy button
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = async () => {
                    const text = pre.querySelector('code').textContent;
                    await navigator.clipboard.writeText(text);
                    btn.textContent = 'Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = 'Copy';
                        btn.classList.remove('copied');
                    }, 2000);
                };
                pre.appendChild(btn);
            });
        }

        function switchDlPref(pref) {
            dlPref = pref;
            localStorage.setItem('get-rso-dl-pref', pref);

            // Update all code blocks with alternatives
            document.querySelectorAll('pre[data-has-alt]').forEach(pre => {
                const code = pre.querySelector('code');
                const lang = (code.className.match(/language-(\w+)/) || [])[1] || '';
                const text = pref === 'alt' ? pre.dataset.alt : pre.dataset.primary;
                code.textContent = text;
                if (lang && hljs.getLanguage(lang)) hljs.highlightElement(code);
            });

            // Update all toggle buttons
            document.querySelectorAll('.dl-toggle-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.pref === pref);
            });
        }

        function addHeadingLinks() {
            document.querySelectorAll('#content h2, #content h3').forEach(heading => {
                heading.onclick = async () => {
                    const url = window.location.origin + window.location.pathname + '#' + heading.id;
                    await navigator.clipboard.writeText(url);
                    showToast();
                };
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateStats() {
            const count = document.querySelectorAll('#content h3').length;
            document.getElementById('scriptCount').textContent = count;
        }

        // Scroll progress
        function updateScrollProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            document.getElementById('scrollProgress').style.width = progress + '%';

            const backToTop = document.getElementById('backToTop');
            if (scrollTop > 500) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        }

        document.getElementById('backToTop').onclick = () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.addEventListener('scroll', updateScrollProgress);

        function initMobileMenu() {
            sidebar = document.getElementById('sidebar');
            backdrop = document.getElementById('sidebarBackdrop');
            mobileToggle = document.getElementById('mobileToggle');

            if (mobileToggle) mobileToggle.onclick = toggleSidebar;
            if (backdrop) backdrop.onclick = closeSidebar;
        }

        // Active section tracking
        window.addEventListener('scroll', () => {
            const items = document.querySelectorAll('.toc-item');
            let current = '';
            document.querySelectorAll('h3').forEach(h3 => {
                if (h3.getBoundingClientRect().top < 150) current = h3.id;
            });
            items.forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('href') === '#' + current) item.classList.add('active');
            });
        });

        // Search
        let searchIndex = [];

        function buildSearchIndex() {
            searchIndex = [];
            const content = document.getElementById('content');
            const headings = content.querySelectorAll('h2, h3');

            headings.forEach(heading => {
                let parentSection = '';
                if (heading.tagName === 'H3') {
                    let prev = heading.previousElementSibling;
                    while (prev) {
                        if (prev.tagName === 'H2') { parentSection = prev.textContent; break; }
                        prev = prev.previousElementSibling;
                    }
                }

                let codeContent = '';
                let sibling = heading.nextElementSibling;
                while (sibling && !['H2', 'H3'].includes(sibling.tagName)) {
                    if (sibling.tagName === 'PRE' || sibling.tagName === 'P') {
                        codeContent += ' ' + sibling.textContent;
                    }
                    sibling = sibling.nextElementSibling;
                }

                searchIndex.push({
                    title: heading.textContent,
                    id: heading.id,
                    section: parentSection,
                    tab: activeTab,
                    type: heading.tagName,
                    content: codeContent.toLowerCase()
                });
            });

            // Also index the other tab
            const otherTab = activeTab === 'bash' ? 'powershell' : 'bash';
            const otherContent = allSections[otherTab];
            if (otherContent) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = marked.parse(otherContent);
                const otherHeadings = tempDiv.querySelectorAll('h2, h3');
                otherHeadings.forEach(heading => {
                    searchIndex.push({
                        title: heading.textContent,
                        id: heading.id,
                        section: '',
                        tab: otherTab,
                        type: heading.tagName,
                        content: ''
                    });
                });
            }
        }

        function performSearch(query) {
            const searchResults = document.getElementById('searchResults');
            const toc = document.getElementById('toc');
            const q = query.toLowerCase().trim();

            if (!q) {
                searchResults.classList.add('hidden');
                toc.classList.remove('hidden');
                return;
            }

            searchResults.classList.remove('hidden');
            toc.classList.add('hidden');

            const results = searchIndex.filter(item =>
                item.title.toLowerCase().includes(q) || item.content.includes(q)
            );

            if (results.length === 0) {
                searchResults.innerHTML = '<div class="search-no-results">No results found</div>';
                return;
            }

            searchResults.innerHTML = results.slice(0, 20).map(item => {
                const tabLabel = item.tab !== activeTab ? ' [' + item.tab + ']' : '';
                return '<a href="#' + item.id + '" class="search-result" data-tab="' + item.tab + '" onclick="searchNavigate(\'' + item.tab + '\', \'' + item.id + '\')">' +
                    item.title + tabLabel +
                    (item.section ? '<span class="search-result-section">' + item.section + '</span>' : '') +
                '</a>';
            }).join('');
        }

        function searchNavigate(tab, id) {
            if (tab !== activeTab) {
                renderTab(tab);
            }
            clearSearch();
            setTimeout(() => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('toc').classList.remove('hidden');
            if (window.innerWidth <= 1024) closeSidebar();
        }

        // Event listeners
        let searchTimeout;
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => performSearch(e.target.value), 150);
            });

            document.getElementById('searchInput').addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { clearSearch(); e.target.blur(); }
            });

            document.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => renderTab(btn.dataset.tab);
            });
        });

        // =============================================
        // Script Builder
        // =============================================
        let builderScripts = JSON.parse(localStorage.getItem('get-rso-builder') || '[]');

        function openBuilder() {
            document.getElementById('builderDrawer').classList.add('open');
            document.getElementById('builderBackdrop').classList.add('show');
        }
        function closeBuilder() {
            document.getElementById('builderDrawer').classList.remove('open');
            document.getElementById('builderBackdrop').classList.remove('show');
        }
        function toggleBuilder() {
            document.getElementById('builderDrawer').classList.contains('open') ? closeBuilder() : openBuilder();
        }

        function saveBuilder() {
            localStorage.setItem('get-rso-builder', JSON.stringify(builderScripts));
            renderBuilder();
        }

        function addToBuilder(scriptName, dlTool) {
            if (builderScripts.find(s => s.name === scriptName)) return;
            const isFirst = builderScripts.length === 0;
            builderScripts.push({ name: scriptName, dl: dlTool });
            saveBuilder();
            if (isFirst) openBuilder();
        }

        function removeFromBuilder(scriptName) {
            builderScripts = builderScripts.filter(s => s.name !== scriptName);
            saveBuilder();
            updateAddButtons();
        }

        function clearBuilder() {
            builderScripts = [];
            saveBuilder();
            updateAddButtons();
        }

        function renderBuilder() {
            const list = document.getElementById('builderList');
            const footer = document.getElementById('builderFooter');
            const count = document.getElementById('builderCount');
            const preview = document.getElementById('builderPreview');

            count.textContent = builderScripts.length || '';

            if (builderScripts.length === 0) {
                list.innerHTML = '<div class="builder-empty">Click <code>+ Add</code> on any script<br>to build a combined installer</div>';
                footer.style.display = 'none';
                preview.classList.remove('show');
                return;
            }

            footer.style.display = '';
            list.innerHTML = builderScripts.map(s =>
                '<div class="builder-item">' +
                    '<span class="builder-item-name">' + s.name + '</span>' +
                    '<button class="builder-item-remove" onclick="removeFromBuilder(\'' + s.name.replace(/'/g, "\\'") + '\')" title="Remove">&times;</button>' +
                '</div>'
            ).join('');

            // Update preview
            preview.textContent = generateBuilderScript();
            updateAddButtons();
        }

        function generateBuilderScript() {
            const baseUrl = 'get.rso.dev/sh/';
            let lines = [
                '#!/usr/bin/env sh',
                '# Combined installer generated by get.rso.dev',
                '# Scripts: ' + builderScripts.map(s => s.name).join(', '),
                'set -e',
                ''
            ];

            builderScripts.forEach(s => {
                if (s.dl === 'curl') {
                    lines.push('curl -fsSL ' + baseUrl + s.name + ' | sh');
                } else {
                    lines.push('wget -qO- ' + baseUrl + s.name + ' | sh');
                }
            });
            return lines.join('\n');
        }

        function copyBuilderScript() {
            const script = generateBuilderScript();
            navigator.clipboard.writeText(script).then(() => {
                const btn = document.getElementById('builderCopy');
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = 'Copy Script'; }, 2000);
            });
        }

        function downloadBuilderScript() {
            const script = generateBuilderScript();
            const blob = new Blob([script], { type: 'text/x-shellscript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'install-bundle.sh';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Add "+" buttons to script code blocks
        function addBuilderButtons() {
            document.querySelectorAll('#content h3').forEach(h3 => {
                const scriptName = h3.textContent.trim();
                // Find the first code block for this script
                let el = h3.nextElementSibling;
                while (el && !['H2', 'H3'].includes(el.tagName)) {
                    if (el.tagName === 'PRE') {
                        const btn = document.createElement('button');
                        btn.className = 'add-builder-btn';
                        btn.dataset.script = scriptName;
                        const isAdded = builderScripts.find(s => s.name === scriptName);
                        btn.textContent = isAdded ? 'Added' : '+ Add';
                        if (isAdded) btn.classList.add('added');
                        btn.onclick = () => {
                            if (builderScripts.find(s => s.name === scriptName)) {
                                removeFromBuilder(scriptName);
                            } else {
                                addToBuilder(scriptName, dlPref === 'alt' ? 'curl' : 'wget');
                            }
                            updateAddButtons();
                        };
                        el.appendChild(btn);
                        break;
                    }
                    el = el.nextElementSibling;
                }
            });
        }

        function updateAddButtons() {
            document.querySelectorAll('.add-builder-btn').forEach(btn => {
                const name = btn.dataset.script;
                const isAdded = builderScripts.find(s => s.name === name);
                btn.textContent = isAdded ? 'Added' : '+ Add';
                btn.classList.toggle('added', !!isAdded);
            });
        }

        // Wire up builder UI events
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('builderToggle').onclick = toggleBuilder;
            document.getElementById('builderBackdrop').onclick = closeBuilder;
            document.getElementById('builderClose').onclick = closeBuilder;
            document.getElementById('builderCopy').onclick = copyBuilderScript;
            document.getElementById('builderDownload').onclick = downloadBuilderScript;
            document.getElementById('builderClear').onclick = clearBuilder;
            document.getElementById('builderPreviewToggle').onclick = () => {
                document.getElementById('builderPreview').classList.toggle('show');
            };
        });

        init();
    </script>
</body>
