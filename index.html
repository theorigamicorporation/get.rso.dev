<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>get.rso.dev</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230d1117'/%3E%3Crect x='2' y='2' width='60' height='60' rx='10' fill='none' stroke='%2330363d' stroke-width='2'/%3E%3Ctext x='8' y='32' font-family='monospace' font-weight='bold' font-size='24' fill='%233fb950'%3E$%3C/text%3E%3Cpath d='M28 18 L28 38 M20 30 L28 38 L36 30' stroke='%2358a6ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cline x1='18' y1='46' x2='38' y2='46' stroke='%2358a6ff' stroke-width='4' stroke-linecap='round'/%3E%3Ctext x='42' y='46' font-family='monospace' font-size='18' fill='%238b949e'%3Esh%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --code-bg: #1c2128;
            --success: #3fb950;
            --warning: #d29922;
            --purple: #a371f7;
        }

        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--purple));
            z-index: 1000;
            transition: width 0.1s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
        }

        .container { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            position: fixed;
            left: 0; top: 0;
            height: 100vh;
            overflow-y: auto;
            padding: 2rem 0;
            transition: transform 0.3s ease;
            z-index: 50;
        }

        .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .sidebar-badges {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-tertiary);
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .stats-badge span { color: var(--accent); font-weight: 600; }

        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--bg-tertiary);
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .github-btn:hover {
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
        }

        .kbd {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.15rem 0.4rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 0.25rem;
            padding: 0 1.5rem;
            margin-bottom: 1rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.5rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tab-btn:hover { color: var(--text); border-color: var(--text-muted); }

        .tab-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* Search */
        .search-container { padding: 0 1.5rem; margin-bottom: 1rem; }

        .search-wrapper { position: relative; }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.15s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-results { padding: 0 1rem; max-height: calc(100vh - 280px); overflow-y: auto; }

        .search-result {
            display: block;
            padding: 0.6rem 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 4px;
            margin-bottom: 0.25rem;
            transition: all 0.15s ease;
        }

        .search-result:hover { color: var(--accent); background: var(--bg-tertiary); }

        .search-result-section {
            font-size: 0.7rem;
            color: var(--accent);
            opacity: 0.7;
            display: block;
            margin-top: 0.2rem;
        }

        .search-no-results { padding: 1rem; color: var(--text-muted); font-size: 0.85rem; }

        .hidden { display: none !important; }

        /* TOC */
        .toc { padding: 0 1rem; }

        .toc-section { margin-bottom: 0.5rem; }

        .toc-section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .toc-section-title:hover { background: var(--bg-tertiary); }

        .toc-section-title::before {
            content: '\25B8';
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s ease;
        }

        .toc-section.open .toc-section-title::before { transform: rotate(90deg); }

        .toc-items { display: none; padding-left: 1.5rem; }
        .toc-section.open .toc-items { display: block; }

        .toc-item {
            display: block;
            padding: 0.4rem 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .toc-item:hover { color: var(--accent); background: var(--bg-tertiary); }
        .toc-item.active { color: var(--accent); background: rgba(88, 166, 255, 0.1); }

        /* Main content */
        .main {
            flex: 1;
            margin-left: 320px;
            padding: 3rem 4rem;
            max-width: 1400px;
        }

        h1, h2, h3, h4 {
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        h1 { font-size: 2.5rem; margin-top: 0; }
        h2 { font-size: 1.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        h3 { font-size: 1.25rem; color: var(--accent); }
        h4 { font-size: 1rem; color: var(--text-muted); }

        p { margin-bottom: 1rem; color: var(--text-muted); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* Code blocks */
        pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem 1.2rem;
            padding-top: 2.8rem;
            overflow-x: auto;
            margin: 1rem 0 1.5rem;
            position: relative;
        }

        .code-lang {
            position: absolute;
            top: 0.7rem;
            left: 0.75rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--purple);
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1;
        }

        pre code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            background: none;
            padding: 0;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-tertiary);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* Copy button */
        .copy-btn {
            position: absolute;
            top: 0.7rem;
            right: 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.15s ease;
            opacity: 1;
            line-height: 1;
        }

        .copy-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .copy-btn.copied { background: var(--success); border-color: var(--success); color: var(--bg); }

        /* Download tool toggle */
        .dl-toggle {
            position: absolute;
            top: 0.7rem;
            right: 4.5rem;
            display: inline-flex;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            line-height: 1;
        }

        .dl-toggle-btn {
            padding: 0.3rem 0.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .dl-toggle-btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        .dl-toggle-btn:hover:not(.active) {
            color: var(--text);
        }

        /* Method picker */
        .method-picker {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin: 0.5rem 0 0.25rem;
        }

        .method-picker-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
        }

        .method-picker select {
            padding: 0.25rem 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .method-picker select:hover { border-color: var(--text-muted); }
        .method-picker select:focus { border-color: var(--accent); }

        .method-picker select option {
            background: var(--bg-secondary);
            color: var(--text);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0 1.5rem;
        }

        th, td {
            padding: 0.5rem 0.75rem;
            text-align: left;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        th {
            background: var(--bg-secondary);
            font-weight: 600;
            color: var(--text);
        }

        td { color: var(--text-muted); }

        /* Lists */
        ul, ol { margin: 1rem 0; padding-left: 1.5rem; color: var(--text-muted); }
        li { margin: 0.5rem 0; }
        hr { border: none; height: 1px; background: var(--border); margin: 3rem 0; }

        /* Heading links */
        h2, h3 { cursor: pointer; position: relative; }

        .link-copied-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: var(--bg);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .link-copied-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: 5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-to-top:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .back-to-top.visible { opacity: 1; visibility: visible; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main h2, .main h3, .main pre, .main p { animation: fadeInUp 0.4s ease forwards; }

        /* Mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-backdrop.show { opacity: 1; }

        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 50%;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        .mobile-toggle:hover { background: var(--bg-tertiary); border-color: var(--accent); transform: scale(1.05); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 2rem 1.5rem; max-width: 100%; }
            .mobile-toggle { display: flex; align-items: center; justify-content: center; }
            .sidebar-backdrop { display: block; }
        }

        @media (max-width: 768px) {
            .main { padding: 1.5rem 1rem; }
            pre { padding-left: 0.75rem; padding-right: 0.75rem; margin-left: -0.5rem; margin-right: -0.5rem; }
            h2 { font-size: 1.5rem; }
            h3 { font-size: 1.15rem; }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Filter bar */
        .filter-details {
            margin: 0 1.25rem 0.75rem;
        }

        .filter-summary {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.35rem 0;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.15s ease;
        }

        .filter-summary::-webkit-details-marker { display: none; }

        .filter-summary::before {
            content: '\25B8';
            font-size: 0.6rem;
            transition: transform 0.2s ease;
        }

        .filter-details[open] .filter-summary::before { transform: rotate(90deg); }
        .filter-summary:hover { color: var(--text); }

        .filter-details .filter-bar {
            padding: 0.4rem 0 0;
        }

        .filter-group {
            margin-bottom: 0.5rem;
        }

        .filter-group-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            opacity: 0.5;
            margin-bottom: 0.25rem;
            display: block;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
        }

        .filter-pill {
            padding: 0.1rem 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.15s ease;
            line-height: 1.4;
        }

        .filter-pill:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        .filter-pill.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(88, 166, 255, 0.08);
        }

        .filter-pill.active.method-filter {
            border-color: var(--purple);
            color: var(--purple);
            background: rgba(163, 113, 247, 0.08);
        }

        .filter-pill.active.distro-filter {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(88, 166, 255, 0.08);
        }

        .filter-clear {
            padding: 0.1rem 0.35rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            opacity: 0.4;
            transition: all 0.15s ease;
        }

        .filter-clear:hover {
            opacity: 1;
            color: #f85149;
        }

        .script-filtered-out {
            display: none !important;
        }

        /* Script metadata block */
        .script-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: 0.75rem 0 1rem;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .script-meta-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .script-meta-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            min-width: 4.5rem;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .script-meta-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .meta-pill {
            display: inline-block;
            padding: 0.12rem 0.45rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            border-radius: 3px;
            line-height: 1.4;
        }

        .meta-pill.distro {
            background: rgba(88, 166, 255, 0.08);
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.15);
        }

        .meta-pill.method {
            background: rgba(163, 113, 247, 0.08);
            color: var(--purple);
            border: 1px solid rgba(163, 113, 247, 0.15);
        }

        .meta-pill.tag {
            background: rgba(139, 148, 158, 0.08);
            color: var(--text-muted);
            border: 1px solid rgba(139, 148, 158, 0.12);
        }

        .meta-pill.prereq {
            background: rgba(210, 153, 34, 0.08);
            color: var(--warning);
            border: 1px solid rgba(210, 153, 34, 0.15);
        }

        .meta-pill.hash {
            background: rgba(63, 185, 80, 0.06);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.12);
            opacity: 0.6;
            font-size: 0.65rem;
        }

        @media (max-width: 768px) {
            .script-meta-row {
                flex-direction: column;
                gap: 0.25rem;
            }
            .script-meta-label {
                min-width: unset;
            }
        }

        /* Test result badges */
        .test-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin: 0.25rem 0;
        }

        .test-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.15rem 0.45rem;
            border-radius: 3px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            line-height: 1;
        }

        .test-badge.pass {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .test-badge.fail {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .test-badge.skip, .test-badge.untested {
            background: rgba(139, 148, 158, 0.1);
            color: var(--text-muted);
            border: 1px solid rgba(139, 148, 158, 0.2);
        }

        .test-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .test-badge.pass .dot { background: var(--success); }
        .test-badge.fail .dot { background: #f85149; }
        .test-badge.skip .dot, .test-badge.untested .dot { background: var(--text-muted); }

        /* Collapsible details/spoiler */
        details.script-details {
            margin: 0.5rem 0 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        details.script-details summary {
            padding: 0.6rem 1rem;
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            min-height: 44px;
        }

        details.script-details summary::-webkit-details-marker { display: none; }

        details.script-details summary::before {
            content: '\25B8';
            font-size: 0.7rem;
            transition: transform 0.2s ease;
        }

        details.script-details[open] summary::before { transform: rotate(90deg); }

        details.script-details summary:hover { color: var(--text); background: var(--bg-tertiary); }

        details.script-details .details-content {
            padding: 0.75rem 1rem;
        }

        details.script-details .details-content pre {
            margin: 0.5rem 0;
        }

        details.script-details .details-content table {
            margin: 0.5rem 0;
        }

        details.script-details .details-content p {
            margin-bottom: 0.5rem;
        }

        .build-footer {
            position: fixed;
            bottom: 0;
            left: 320px;
            right: 0;
            padding: 0.3rem 1rem;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            text-align: right;
            z-index: 40;
            opacity: 0.6;
        }

        .build-footer a { color: var(--text-muted); }
        .build-footer a:hover { color: var(--accent); }

        @media (max-width: 1024px) {
            .build-footer { left: 0; }
        }

        /* Script Builder Drawer */
        .builder-toggle {
            position: fixed;
            bottom: 5rem;
            right: 4.5rem;
            width: 44px;
            height: 44px;
            background: var(--purple);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(163, 113, 247, 0.3);
            transition: all 0.2s ease;
        }
        .builder-toggle:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(163, 113, 247, 0.5); }
        .builder-toggle .builder-count {
            position: absolute;
            top: -4px; right: -4px;
            background: var(--accent);
            color: var(--bg);
            font-size: 0.65rem;
            font-weight: 700;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .builder-toggle .builder-count:empty { display: none; }

        .builder-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .builder-backdrop.show { display: block; opacity: 1; }

        .builder-drawer {
            position: fixed;
            top: 0; right: 0;
            width: 420px;
            max-width: 90vw;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            z-index: 201;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .builder-drawer.open { transform: translateX(0); }

        .builder-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .builder-header h3 {
            margin: 0; font-size: 1rem; color: var(--purple);
            display: flex; align-items: center; gap: 0.5rem;
            animation: none;
        }
        .builder-close {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.2rem; cursor: pointer; padding: 0.25rem;
            transition: color 0.15s;
        }
        .builder-close:hover { color: var(--text); }

        .builder-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 1rem;
        }
        .builder-empty {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 3rem 1rem;
            line-height: 1.8;
        }
        .builder-empty code { font-size: 0.8rem; }

        .builder-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            animation: fadeInUp 0.2s ease;
        }
        .builder-item-name { flex: 1; }
        .builder-item-remove {
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 0.9rem; padding: 0 0.25rem;
            transition: color 0.15s;
        }
        .builder-item-remove:hover { color: #f85149; }

        .builder-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .builder-actions {
            display: flex; gap: 0.5rem;
        }
        .builder-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid var(--border);
            text-align: center;
        }
        .builder-btn-primary {
            background: var(--purple);
            color: #fff;
            border-color: var(--purple);
        }
        .builder-btn-primary:hover { opacity: 0.9; }
        .builder-btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text);
        }
        .builder-btn-secondary:hover { border-color: var(--text-muted); }
        .builder-btn-danger {
            background: transparent;
            color: var(--text-muted);
            border-color: transparent;
            font-size: 0.75rem;
        }
        .builder-btn-danger:hover { color: #f85149; }

        .builder-preview {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: pre;
            line-height: 1.5;
            display: none;
        }
        .builder-preview.show { display: block; }

        /* Add-to-builder button on code blocks */
        .add-builder-btn {
            position: absolute;
            top: 0.7rem;
            left: 3.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--purple);
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.15s ease;
            line-height: 1;
        }
        .add-builder-btn:hover { background: var(--purple); color: #fff; border-color: var(--purple); }
        .add-builder-btn.added { background: var(--purple); color: #fff; border-color: var(--purple); }

        @media (max-width: 1024px) {
            .builder-toggle { bottom: 5rem; right: 1.5rem; }
            .builder-drawer { width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>
    <div class="loading" id="loading">Loading scripts</div>

    <div class="container" id="app" style="display: none;">
        <aside class="sidebar" id="sidebar">

                <h1>get.rso.dev</h1>
                <p>Cross-distro install scripts for your terminal</p>
                <div class="sidebar-badges">

                        <span id="scriptCount">0</span> scripts
                    </div>
                    <a href="https://github.com/theorigamicorporation/get.rso.dev" target="_blank" class="github-btn">
                        Star
                    </a>
                </div>
            </div>
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="linux">Linux</button>
                <button class="tab-btn" data-tab="windows">Windows</button>
            </div>
            <div class="search-container">
                <div class="search-wrapper">
                    <span class="search-icon">?</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off">
                    <span class="kbd">Ctrl+K</span>
                </div>
            </div>
            <div class="search-results hidden" id="searchResults"></div>
